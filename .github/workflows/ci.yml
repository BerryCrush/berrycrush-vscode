name: VS Code Extension CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build
        uses: ./.github/actions/build

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: berrycrush-vscode
          path: '*.vsix'
          retention-days: 30
